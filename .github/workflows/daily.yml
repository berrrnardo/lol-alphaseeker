name: daily-ratings-update
on:
  schedule:
    - cron: "0 9 * * *"      # 09:00 UTC daily (~06:00 BRT). Adjust as you like.
  workflow_dispatch: {}        # lets you trigger manually from the Actions tab
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allow committing ratings.json back to the repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pandas requests
      - run: python update_ratings.py
      - name: commit updated ratings
        run: |
          git config user.name  "ratings-bot"
          git config user.email "bot@users.noreply.github.com"
          git add ratings.json
          git commit -m "daily ratings update $(date -u +%F)" || echo "no changes"
          git push
